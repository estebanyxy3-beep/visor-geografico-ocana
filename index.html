<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Visor Geográfico de Ocaña</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="header">
  <h1>📍 Visor Geográfico de Ocaña</h1>
</div>

<div class="sidebar">
  <h3>Capas</h3>

  <div class="layer-item">
    <input type="checkbox" id="chkTratamientos" checked>
    <label for="chkTratamientos">Tratamientos patrimoniales</label>
  </div>

  <div class="layer-item">
    <input type="checkbox" id="chkTextos" checked>
    <label for="chkTextos">Textos / Annotation</label>
  </div>

  <hr>

  <p><b>Información</b></p>
  <p>Visor geográfico patrimonial del municipio de Ocaña.</p>
</div>

<div class="legend">
  <h4>Leyenda</h4>
  <p>🟩 BIC DEP</p>
  <p>🟨 BIC MUN / BIC NAL</p>
  <p>🟧 Valor arquitectónico</p>
  <p>⬜ Predios sin valor</p>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/main.js"></script>

</body>
</html>
