<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visor Geográfico de Ocaña</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="header">
    <h1>📍 Visor Geográfico de Ocaña</h1>
  </div>

  <div class="sidebar">
    <h2>Capas</h2>

    <label>
      <input type="checkbox" id="chkPatrimonio" checked>
      Patrimonio cultural
    </label>

    <br><br>

    <label>
      <input type="checkbox" id="chkAnnotation" checked>
      Textos / Annotation
    </label>

    <hr>

    <h3>Información</h3>
    <p>Visor geográfico patrimonial del municipio de Ocaña.</p>

    <h3>Leyenda</h3>
    <div><span class="color bicdep"></span> BIC DEP</div>
    <div><span class="color bicmun"></span> BIC MUN</div>
    <div><span class="color bicnal"></span> BIC NAL</div>
    <div><span class="color tipologica"></span> Tipológica</div>
    <div><span class="color arquitectonico"></span> Valor arquitectónico</div>
    <div><span class="color sinvalor"></span> Predios sin valor</div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="main.js?v=10"></script>

</body>
</html>
